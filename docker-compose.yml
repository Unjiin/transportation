services:
  db:
    image: postgres:16-alpine
    container_name: transportation-db
    environment:
      POSTGRES_DB: transportation
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d transportation"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: transportation-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 4000
      DATABASE_URL: postgres://postgres:postgres@db:5432/transportation
      PRICE_PER_KM: 18
      MIN_PRICE: 1500
      ALLOWED_ORIGIN: http://localhost:3000
    ports:
      - "4000:4000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:4000/api
    container_name: transportation-frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  postgres_data:
